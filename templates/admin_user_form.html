{% extends 'admin_base.html' %}
{% block title %}Almal Expert | {% if user %}Editar usuário{% else %}Novo usuário{% endif %}{% endblock %}

{% block admin_content %}
<div class="section-header">
    <div>
        <span class="eyebrow">Cadastro de usuários</span>
        <h2>{% if user %}Editar usuário{% else %}Novo usuário{% endif %}</h2>
    </div>
    <a class="outline-btn" href="{{ url_for('admin_users') }}">Voltar</a>
</div>

<section class="panel">
    <form method="POST" class="form-grid">
        <div>
            <label>Nome *</label>
            <input type="text" name="nome" value="{{ user.nome if user else '' }}" required>
        </div>
        <div>
            <label>Setor</label>
            <input type="text" name="setor" value="{{ user.setor if user else '' }}">
        </div>
        <div>
            <label>Matrícula</label>
            <input type="text" name="matricula" value="{{ user.matricula if user else '' }}">
        </div>
        <div>
            <label>Telefone / Ramal</label>
            <input type="text" name="telefone" value="{{ user.telefone if user else '' }}">
        </div>
        <div class="full">
            <button type="submit" class="primary-btn">{% if user %}Salvar alterações{% else %}Cadastrar usuário{% endif %}</button>
        </div>
    </form>
</section>
{% endblock %}
