{% extends 'base.html' %}
{% block title %}Almoxpert | Trocar senha{% endblock %}

{% block content %}
<section class="login-shell">
    <div class="login-card">
        <span class="eyebrow">Primeiro acesso</span>
        <h2>Troque sua senha</h2>
        <p class="muted">Defina uma senha pessoal para continuar usando o sistema.</p>

        <form method="POST" action="{{ url_for('change_requester_password') }}" class="form-grid single-col compact-form">
            <div>
                <label>Nova senha</label>
                <input type="password" name="nova_senha" required autocomplete="new-password">
            </div>
            <div>
                <label>Confirmar nova senha</label>
                <input type="password" name="confirmar_senha" required autocomplete="new-password">
            </div>
            <div>
                <button type="submit" class="primary-btn">Salvar nova senha</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
